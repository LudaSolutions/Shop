  body {

  .form {

    flex-direction: column;

    justify-content: center; /* Центруємо по вертикалі теж */

    font-size: 32px;
  }
 
  h1, h2, h3 {
    /* Зробив градієнт темнішим, щоб було видно на світлому папері */
    background: -webkit-linear-gradient(#555, #000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0;
    text-transform: uppercase;
    text-align: center;
  }
  
  p {
    font-weight: bold;

  }

  .hidden {
    display: none !important;
  }

    color: black;
    font-family: inherit;
    font-size: 24px;
    resize: none; /* Щоб не можна було розтягувати */

    border-radius: 10px;
    margin-top: 20px;
  }

    font-size: 24px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 20px;
    border-radius: 5px;
    font-weight: bold;
  }
